version: '3.8'

services:
  # Backend API
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: jartbrowser-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://jartbrowser:jartpassword@db:5432/jartbrowser
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - jartbrowser

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: jartbrowser-db
    environment:
      - POSTGRES_USER=jartbrowser
      - POSTGRES_PASSWORD=jartpassword
      - POSTGRES_DB=jartbrowser
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jartbrowser"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jartbrowser

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jartbrowser-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jartbrowser

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: jartbrowser-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - jartbrowser

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: jartbrowser-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - jartbrowser

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: jartbrowser-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - jartbrowser

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  jartbrowser:
    driver: bridge
